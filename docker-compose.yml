services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: botka
      POSTGRES_PASSWORD: botka
      POSTGRES_DB: botka
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  bot:
    build: .
    env_file:
      - .env
    depends_on:
      - db
  pgweb:
    image: sosedoff/pgweb
    env_file:
      - .env
    environment:
      PGWEB_DATABASE_URL: ${BOTKA_PGWEB_DATABASE_URL}
    depends_on:
      - db
    ports:
      - "8081:8081"

volumes:
  db_data:
