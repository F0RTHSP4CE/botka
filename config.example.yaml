# Configuration for the Telegram bot (Python version)

telegram:
  # Token provided by Telegram's BotFather for authentication.
  token: "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"

  # Bot administrators (Telegram user IDs)
  admins: [1234567890]

  # Ignore all messages, but keep handling button callbacks, poll answers, etc.
  passive_mode: false

  # Configuration for specific chat threads.
  chats:
    # List of chats considered as residents-only.
    residential:
      - -1001234567890

    # Thread for the 'needs' module (shopping list).
    needs:
      chat: -1001234567890
      thread: 123

    # Thread for MAC monitoring notifications.
    mac_monitoring:
      chat: -1001234567890
      thread: 456

    # Thread for "ask to visit" messages from non-residents.
    ask_to_visit:
      chat: -1001234567890
      thread: 789

    # Configuration for "vortex of doom" (inactive topic archiving).
    vortex:
      enabled: false
      archive_topic_id: 999

# Address to provide HTTP API on.
server_addr: "0.0.0.0:8080"

# External services configuration.
services:
  # Mikrotik REST API for getting MAC addresses of connected devices.
  mikrotik:
    host: "10.0.0.1"
    username: "api_user"
    password: "SECRET"
    scheme: "http"  # http, https, or auto

  # ESP camera configuration (optional).
  racovina_cam:
    url: "http://espcam-1.lo.f0rth.space:8081/"

  # Second camera (hlam) (optional).
  hlam_cam:
    url: "http://espcam-2.lo.f0rth.space:8081/"

  # Butler API for door opening (optional).
  butler:
    url: "http://butler.lo.f0rth.space:8080/control"
    token: "SECRET"

  # OpenAI (or compatible) API for NLP and TLDR features.
  openai:
    api_key: "sk-xxx"
    base_url: "https://api.openai.com/v1"  # or OpenRouter: "https://openrouter.ai/api/v1"
    model: "gpt-4o-mini"

  # Wiki.js GraphQL API for welcome messages.
  wikijs:
    url: "https://wiki.f0rth.space/graphql"
    token: "SECRET"

# NLP (Natural Language Processing) configuration.
nlp:
  # Enable/disable NLP processing.
  enabled: false

  # Trigger words that activate NLP processing in group chats.
  # If empty, all messages are processed.
  trigger_words:
    - "botka"
    - "бот"
    - "f0bot"

  # Maximum chat history to consider (messages).
  max_history: 100

  # Probability (0-100) of randomly responding to messages without triggers.
  random_answer_probability: 0.0

  # Models to use for different complexity levels (cheapest to most capable).
  # Classification uses the first model, complex requests use the last.
  models:
    - "gpt-4o-mini"
    - "gpt-4o"

# Borrowed items configuration.
borrowed_items:
  # Maximum duration for borrowed items (in days).
  max_borrow_days: 30
